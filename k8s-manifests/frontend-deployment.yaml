apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mern-frontend
  template:
    metadata:
      labels:
        app: mern-frontend
    spec:
      containers:
      - name: frontend-app
        # Jenkins will automatically overwrite 'latest' with 'v1', 'v2', etc.
        image: aravind80555/shop-frontend:v12
        ports:
        - containerPort: 3000
